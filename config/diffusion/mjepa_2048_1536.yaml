fit:
  compile: true
  float32_matmul_precision: medium
  trainer:
    accelerator: gpu
    devices: 2
    strategy: "ddp"
    precision: "bf16-mixed"
    max_steps: 150000
    num_sanity_val_steps: 0
    val_check_interval: 10000
    default_root_dir: /mnt/storage/users/chase/mitub
    callbacks:
      - class_path: pytorch_lightning.callbacks.ModelCheckpoint
        init_args:
          filename: "epoch={epoch}-step={step}-loss={val/loss:.4f}"
          monitor: "val/loss"
          auto_insert_metric_name: false
          mode: min
          save_last: true

      - class_path: pytorch_lightning.callbacks.LearningRateMonitor
        init_args:
          log_momentum: true

    logger:
      class_path: pytorch_lightning.loggers.wandb.WandbLogger
      init_args:
        save_dir: /mnt/storage/users/chase/mitub
        project: mit-ub
        name: mitub-diffusion

  model:
    class_path: mit_ub.tasks.Diffusion
    init_args:
      backbone: "vit-i1-p16-d768-a32_24"
      #checkpoint: "/mnt/storage/users/chase/mitub/mit-ub/lmj01ch6/checkpoints/last.ckpt"
      #checkpoint: "/mnt/storage/users/chase/mitub/mit-ub/jw2z1ygk/checkpoints/last.ckpt"
      checkpoint: "/mnt/storage/users/chase/mitub/mit-ub/f2vea8di/checkpoints/last.ckpt"
      strict_checkpoint: false

      # Diffusion config
      num_timesteps: 100
      max_noise_level: 0.05
      decoder_depth: 6

      log_train_metrics_interval: 50
      optimizer_init:
        class_path: torch.optim.AdamW
        init_args:
          lr: 0.000025
          weight_decay: 0.05
      lr_interval: "step"
      lr_scheduler_init:
        class_path: torch.optim.lr_scheduler.OneCycleLR
        init_args:
          max_lr: 0.000025
          div_factor: 1
          final_div_factor: 50
          pct_start: 0.30
          three_phase: false
          total_steps: 150000

  data:
    class_path: torch_dicom.preprocessing.datamodule.PreprocessedPNGDataModule
    init_args:

      train_inputs: 
        - "/mnt/active_1/chase/data/optimam_highres"
        - "/mnt/active_1/chase/data/medcog_highres"
      val_inputs: /mnt/active_1/chase/data/test

      metadata_filenames:
        manifest: "manifest.csv"

      batch_size: 1
      num_workers: 12

      train_transforms:
        class_path: torchvision.transforms.v2.Compose
        init_args:
          transforms:
            - class_path: torchvision.transforms.v2.RandomResizedCrop
              init_args:
                size: [2048, 1536]
                scale: [0.8, 1.0]
                ratio: [0.8, 1.2]
                antialias: true

      train_gpu_transforms:
        class_path: torchvision.transforms.v2.Compose
        init_args:
          transforms:
            - class_path: torchvision.transforms.v2.RandomHorizontalFlip
              init_args:
                p: 0.5

            - class_path: torchvision.transforms.v2.RandomVerticalFlip
              init_args:
                p: 0.5

            - class_path: torchvision.transforms.v2.RandomInvert
              init_args:
                p: 0.5